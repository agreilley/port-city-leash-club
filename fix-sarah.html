<!DOCTYPE html>
<html>
<head><title>Fix Sarah Walker Doc</title></head>
<body style="font-family:monospace;background:#0D1B2A;color:#8FA8A2;padding:32px;">
<h2 style="color:white;">Linking Sarah Test's UID to her walker document...</h2>
<div id="log"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, setDoc, getDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = {
  apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
  authDomain: "port-city-leash-club-827ab.firebaseapp.com",
  projectId: "port-city-leash-club-827ab",
  storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
  messagingSenderId: "649385306352",
  appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"
};

function log(msg, ok=true) {
  const d = document.createElement('div');
  d.textContent = (ok ? '✓ ' : '✗ ') + msg;
  d.style.color = ok ? '#2D9E5E' : '#C17B6F';
  d.style.marginBottom = '6px';
  document.getElementById('log').appendChild(d);
}

// Step 1: Sign in as Sarah to get her UID
const sarahEmail = prompt('Enter Sarah Test\'s email:');
const sarahPass = prompt('Enter Sarah Test\'s password:');

const sarahApp = initializeApp(cfg, 'sarah-fix');
const sarahAuth = getAuth(sarahApp);
const sarahCred = await signInWithEmailAndPassword(sarahAuth, sarahEmail, sarahPass);
const sarahUid = sarahCred.user.uid;
log('Sarah UID: ' + sarahUid);

// Step 2: Sign in as admin to write to Firestore
const adminEmail = prompt('Enter your admin email:');
const adminPass = prompt('Enter your admin password:');

const adminApp = initializeApp(cfg, 'admin-fix');
const adminAuth = getAuth(adminApp);
await signInWithEmailAndPassword(adminAuth, adminEmail, adminPass);
const db = getFirestore(adminApp);
log('Signed in as admin');

// Step 3: Get existing walker doc
const existingSnap = await getDoc(doc(db, 'walkers', 'walker_sarah_test'));
if (!existingSnap.exists()) { log('walker_sarah_test not found!', false); }
else {
  const walkerData = { ...existingSnap.data(), uid: sarahUid, walkerId: 'walker_sarah_test' };

  // Save at UID (so Firestore rules can find it)
  await setDoc(doc(db, 'walkers', sarahUid), walkerData);
  log('Created walkers/' + sarahUid);

  // Update original doc with uid and walkerId fields
  await setDoc(doc(db, 'walkers', 'walker_sarah_test'), walkerData);
  log('Updated walker_sarah_test with uid and walkerId fields');

  document.querySelector('h2').textContent = '✓ All done! Sarah can now log into the walker portal.';
  document.querySelector('h2').style.color = '#2D9E5E';
}
</script>
</body>
</html>
