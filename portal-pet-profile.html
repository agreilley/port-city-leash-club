<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Profile - The Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f3ed;
      color: #0D1B2A;
    }

    .portal-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #0D1B2A;
      color: white;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 500;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: #8FA8A2;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-item.active {
      background: #C17B6F;
      color: white;
    }

    .sidebar-pet {
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
      padding-top: 16px;
      color: #8FA8A2;
      font-size: 13px;
    }

    .pet-name {
      margin-bottom: 8px;
    }

    .pet-info {
      font-size: 12px;
      opacity: 0.8;
    }

    .main-content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    .content-max {
      max-width: 700px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 4px;
    }

    .page-header p {
      font-size: 14px;
      color: #888;
      margin: 0;
    }

    .profile-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 0.5px solid #ddd;
      margin-bottom: 24px;
    }

    .photo-section {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .pet-photo {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      background: linear-gradient(135deg, #C17B6F 0%, #8FA8A2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 48px;
      position: relative;
    }

    .photo-button {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: #0D1B2A;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 0.5px solid #ddd;
    }

    .profile-header h2 {
      font-size: 24px;
      font-weight: 500;
      margin: 0 0 4px;
    }

    .profile-header p {
      font-size: 14px;
      color: #888;
      margin: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-grid.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .temperament-section {
      margin-bottom: 24px;
    }

    .temperament-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: #0D1B2A;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }

    .tag-add {
      background: transparent;
      border: 0.5px dashed #8FA8A2;
      color: #8FA8A2;
      padding: 6px 12px;
      cursor: pointer;
    }

    .section-box {
      margin-bottom: 24px;
      padding: 16px;
      background: #f9f8f5;
      border-radius: 8px;
      border: 0.5px solid #ddd;
    }

    .section-box h3 {
      font-size: 14px;
      font-weight: 500;
      color: #0D1B2A;
      margin: 0 0 16px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      padding-top: 12px;
      border-top: 0.5px solid #ddd;
    }

    button {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #C17B6F;
      color: white;
    }

    .btn-primary:hover {
      background: #b06a60;
    }

    .btn-secondary {
      background: transparent;
      color: #888;
      border: 0.5px solid #ddd;
    }

    .btn-secondary:hover {
      background: #f5f3ed;
    }

    .add-pet-section {
      padding: 16px;
      background: white;
      border-radius: 12px;
      border: 0.5px dashed #8FA8A2;
      text-align: center;
    }

    .add-pet-section p {
      font-size: 14px;
      color: #888;
      margin: 0;
    }

    .add-pet-section button {
      background: transparent;
      color: #C17B6F;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="portal-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">The Leash Club</div>
      <nav class="sidebar-nav">
        <a href="portal-dashboard.html" class="nav-item">Dashboard</a>
        <a href="portal-pet-profile.html" class="nav-item active">Pet Profile</a>
        <a href="portal-walk-history.html" class="nav-item">Walk History</a>
        <a href="portal-extras.html" class="nav-item">Extras</a>
        <a href="portal-account.html" class="nav-item">Account</a>
      </nav>
      <div class="sidebar-pet">
        <div class="pet-name">Scout</div>
        <div class="pet-info">Golden Retriever • 4 yrs</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="content-max">
        <div class="page-header">
          <h1>Scout's Profile</h1>
          <p>View and manage Scout's information</p>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
          <!-- Photo Section -->
          <div class="photo-section">
            <div class="pet-photo">
              🐕
              <button class="photo-button">Change</button>
            </div>
          </div>

          <!-- Profile Header -->
          <div class="profile-header">
            <h2>Scout</h2>
            <p>Golden Retriever • 4 years old</p>
          </div>

          <!-- Pet Details -->
          <div class="form-grid">
            <div class="form-group">
              <label>Breed</label>
              <input type="text" value="Golden Retriever">
            </div>
            <div class="form-group">
              <label>Date of birth</label>
              <input type="date" value="2022-06-15">
            </div>
            <div class="form-group">
              <label>Weight</label>
              <input type="text" value="65 lbs">
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select>
                <option selected>Male</option>
                <option>Female</option>
              </select>
            </div>
          </div>

          <!-- Temperament -->
          <div class="temperament-section">
            <label style="margin-bottom: 8px;">Temperament</label>
            <div class="temperament-tags">
              <span class="tag">Friendly ✕</span>
              <span class="tag">Playful ✕</span>
              <span class="tag">Curious ✕</span>
              <button class="tag tag-add">+ Add trait</button>
            </div>
          </div>

          <!-- Walking Details -->
          <div class="form-grid full">
            <div class="form-group">
              <label>Walking details & notes</label>
              <textarea placeholder="Any allergies, medications, behavioral notes, preferred routes, or other details our walkers should know...">Scout is reactive to other dogs but friendly once introduced. Takes glucosamine for joint health. Prefers slower pace on hot days.</textarea>
            </div>
          </div>

          <!-- Address & Access Info -->
          <div class="section-box">
            <h3>Home address & access</h3>
            
            <div class="form-grid full">
              <div class="form-group">
                <label>Street address</label>
                <input type="text" value="1247 Forest Hills Drive">
              </div>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label>City, State, ZIP</label>
                <input type="text" value="Wilmington, NC 28403">
              </div>
              <div class="form-group">
                <label>Parking notes</label>
                <input type="text" value="Driveway on left side">
              </div>
            </div>

            <div class="form-grid full">
              <div class="form-group">
                <label>Gate code or lock type</label>
                <input type="text" value="Front gate code: 4521" placeholder="e.g., gate code, keypad, electronic lock">
              </div>
            </div>

            <div class="form-grid full">
              <div class="form-group">
                <label>Alarm system details</label>
                <input type="text" value="ADT system, code: 1234" placeholder="e.g., system type, disarm code if walker needs to know">
              </div>
            </div>

            <div class="form-grid full">
              <div class="form-group">
                <label>People & pets at home</label>
                <textarea placeholder="Let walkers know: are there other people home? Other pets? Children? Anyone with special needs?">Usually empty during walks. Tom (husband) works from home some Tuesdays. We also have a cat (Whiskers) who stays inside. No other dogs.</textarea>
              </div>
            </div>
          </div>

          <!-- Save Button -->
          <div class="button-group">
            <button class="btn-primary">Save Changes</button>
            <button class="btn-secondary">Cancel</button>
          </div>
        </div>

        <!-- Add Another Pet -->
        <div class="add-pet-section">
          <p>Have another dog?</p>
          <button>+ Add another pet</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
