<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Profile - Port City Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f3ed;
      color: #0D1B2A;
    }

    .portal-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #0D1B2A;
      color: white;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .sidebar-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .sidebar-logo:hover {
      opacity: 0.8;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: #8FA8A2;
      text-decoration: none;
      transition: all 0.2s;
      display: block;
      white-space: nowrap;
      line-height: 1.4;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-item.active {
      padding: 12px 12px;
      background: #C17B6F;
      color: white;
    }

    .sidebar-pet {
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
      padding-top: 16px;
      color: #8FA8A2;
      font-size: 13px;
    }

    .pet-name {
      margin-bottom: 8px;
      font-weight: 500;
    }

    .pet-info {
      font-size: 12px;
      opacity: 0.8;
    }

    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      max-width: 900px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 14px;
      color: #888;
    }

    /* Section Card */
    .section-card {
      background: #FAF8F4;
      border: 1px solid #E5E0D8;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.04);
    }

    .section-title {
      font-size: 18px;
      font-weight: 500;
      color: #0D1B2A;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 20px;
    }

    .field-row.full {
      grid-template-columns: 1fr;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: #7A7A7A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-value {
      font-size: 14px;
      color: #0D1B2A;
    }

    .field-value input,
    .field-value select,
    .field-value textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E5E0D8;
      background: white;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      color: #0D1B2A;
    }

    .field-value textarea {
      resize: vertical;
      min-height: 80px;
    }

    .field-value input:focus,
    .field-value select:focus,
    .field-value textarea:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    /* Photo Section */
    .photo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .photo-upload {
      width: 140px;
      height: 140px;
      background: rgba(193, 123, 111, 0.1);
      border: 2px dashed #C17B6F;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 48px;
      transition: all 0.2s;
    }

    .photo-upload:hover {
      background: rgba(193, 123, 111, 0.15);
    }

    /* Tag List */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      background: white;
      border: 1px solid #E5E0D8;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tag.selected {
      background: #C17B6F;
      color: white;
      border-color: #C17B6F;
    }

    /* Form Actions */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border: 1px solid #E5E0D8;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 4px 20px rgba(13, 27, 42, 0.15);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      color: #0D1B2A;
      max-width: 400px;
      z-index: 10000;
      animation: slideIn 0.3s ease-out;
    }

    .notification.success {
      border-left: 4px solid #8FA8A2;
    }

    .notification.error {
      border-left: 4px solid #C17B6F;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(400px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(400px);
      }
    }

    .notification.dismiss {
      animation: slideOut 0.3s ease-in forwards;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #C17B6F;
      color: white;
    }

    .btn-primary:hover {
      background: #A36358;
    }

    .btn-secondary {
      background: white;
      color: #0D1B2A;
      border: 1px solid #E5E0D8;
    }

    .btn-secondary:hover {
      background: #FAF8F4;
    }

    @media (max-width: 768px) {
      .field-row {
        grid-template-columns: 1fr;
      }

      .section-card {
        padding: 20px;
      }
    }
  
  /* ── PORTAL MOBILE ─────────────────────────────────────────────────────── */
  .mobile-bottom-nav { display: none; }

  @media (max-width: 768px) {
    html, body { overflow-x: hidden; }

    /* Hide sidebar, expand main */
    .sidebar { display: none !important; }
    .portal-container { display: block !important; }
    .main-content { margin-left: 0 !important; padding: 20px 16px 90px !important; }
    .main { margin-left: 0 !important; }
    .content { padding: 20px 16px 90px !important; }

    /* Bottom nav */
    .mobile-bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0D1B2A;
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mobile-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px 12px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 10px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .mobile-tab.active { color: #C17B6F; }
    .mobile-tab svg { opacity: 0.7; }
    .mobile-tab.active svg { opacity: 1; }

    /* Topbar */
    .topbar { padding: 0 16px; height: 52px; }
    .topbar-title { font-size: 18px; }
    .topbar-actions { gap: 8px; }
    .topbar-actions .btn-primary { padding: 7px 14px; font-size: 12px; }
    .topbar-actions .btn-secondary { padding: 7px 14px; font-size: 12px; }

    /* Cards + tables */
    .stats-row { grid-template-columns: 1fr 1fr !important; gap: 10px; }
    .stat-card { padding: 16px; }
    .stat-value { font-size: 28px; }
    table { font-size: 12px; }
    th, td { padding: 10px 10px; }
    .table-search { width: 100%; }
    .table-header { flex-direction: column; align-items: flex-start; gap: 10px; }

    /* Calendar */
    .calendar-day { min-height: 60px; padding: 4px; }
    .day-num { font-size: 11px; width: 20px; height: 20px; }
    .walk-chip { font-size: 9px; padding: 1px 3px; }
    .calendar-weekday { font-size: 9px; padding: 6px 2px; }
    .calendar-legend { flex-wrap: wrap; gap: 8px; }

    /* Forms */
    .form-grid { grid-template-columns: 1fr !important; }
    .form-field { grid-column: 1 !important; }
    .form-shell { grid-template-columns: 1fr !important; }
    .order-sidebar { position: static !important; }
    .summary-card { margin-top: 0; }

    /* Walk cards */
    .walk-card { padding: 14px 16px; gap: 12px; }
    .walk-date-day { font-size: 22px; }

    /* Membership upgrade */
    .plans-grid { grid-template-columns: 1fr !important; }
    .plan-option { padding: 18px; }

    /* Layout helpers */
    .layout { grid-template-columns: 1fr !important; }
    .form-section { padding: 20px 16px !important; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 32px; }
  }

</style>
</head>
<body>
  <div class="portal-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo" style="padding:4px 0;"><img src="../images/logo-horizontal.png" alt="Port City Leash Club" style="height:58px;width:auto;filter:invert(1);opacity:0.9;"></div>
      <nav class="sidebar-nav">
        <a href="portal-dashboard.html" class="nav-item">Dashboard</a>
        <a href="portal-pet-profile.html" class="nav-item active">Pet Profile</a>
        <a href="portal-walk-history.html" class="nav-item">Walk History</a>
        <a href="portal-extras.html" class="nav-item">Additional Care</a>
        <a href="portal-account.html" class="nav-item">Account</a>
      </nav>
      <div class="sidebar-pet" id="sidebarPets">
        <div class="pet-name" id="sidebarDogName"></div>
        <div class="pet-info" id="sidebarDogInfo"></div>
      </div>
        <a href="index.html" style="display:block;padding:16px 24px 20px;font-size:11px;color:rgba(255,255,255,0.35);text-decoration:none;letter-spacing:0.04em;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto;">Port City Leash Club</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="page-header">
        <h1 id="pageTitle">Pet Profile</h1>
        <p id="pageSubtitle">Loading…</p>
      </div>

      <!-- Dogs render here dynamically -->
      <div id="dogsContainer"></div>

      <!-- Home Access (shared across all dogs) -->
      <div class="section-card" id="homeAccessCard" style="display:none;">
        <h2 class="section-title">Home Access</h2>
        <div class="field-row full">
          <div class="field-group">
            <label class="field-label">Home Address</label>
            <div class="field-value"><input type="text" id="homeAddress" placeholder="Full address"></div>
          </div>
        </div>
        <div class="field-row full">
          <div class="field-group">
            <label class="field-label">Parking Notes</label>
            <div class="field-value"><textarea id="parkingNotes" placeholder="Where should walkers park?"></textarea></div>
          </div>
        </div>
        <div class="field-row full">
          <div class="field-group">
            <label class="field-label">Gate Code / Entry Instructions</label>
            <div class="field-value"><input type="text" id="entryCode" placeholder="Building code, alarm code, or entry instructions"></div>
          </div>
        </div>
        <div class="field-row full">
          <div class="field-group">
            <label class="field-label">Additional Notes</label>
            <div class="field-value"><textarea id="accessNotes" placeholder="Any other access information?"></textarea></div>
          </div>
        </div>
      </div>

      <div class="form-actions" id="formActions" style="display:none;">
        <button type="button" class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
  authDomain: "port-city-leash-club-827ab.firebaseapp.com",
  projectId: "port-city-leash-club-827ab",
  storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
  messagingSenderId: "649385306352",
  appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"
};

const app = initializeApp(firebaseConfig, 'member-app');
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let memberData = null;
let currentDogs = []; // live working copy — add/remove edits this

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'portal-login.html'; return; }
  userId = user.uid;
  try {
    const snap = await getDoc(doc(db, 'members', userId));
    if (snap.exists()) {
      memberData = { id: snap.id, ...snap.data() };
      // Normalise to dogs array
      currentDogs = memberData.dogs?.length
        ? memberData.dogs.map(d => ({ ...d }))
        : [{ name: memberData.dogName || '', breed: memberData.petBreed || '', age: memberData.petAge ? `${memberData.petAge} years` : '', weight: memberData.petWeight || '', temperament: memberData.temperament || '', walkingPrefs: memberData.walkingPrefs || '', triggers: memberData.triggers || '', medications: memberData.medications || '', allergies: memberData.allergies || '' }];
      renderPage();
    }
  } catch(e) {
    console.error('Profile load error:', e.message);
  }
});

function renderPage() {
  updateSidebar();
  updatePageHeader();
  renderDogCards();
  // Home access
  document.getElementById('homeAddress').value = memberData.address || '';
  document.getElementById('parkingNotes').value = memberData.parkingNotes || '';
  document.getElementById('entryCode').value = memberData.entryCode || '';
  document.getElementById('accessNotes').value = memberData.accessNotes || '';
  document.getElementById('homeAccessCard').style.display = '';
  document.getElementById('formActions').style.display = '';
}

function updateSidebar() {
  const sidebarPets = document.getElementById('sidebarPets');
  sidebarPets.innerHTML = currentDogs.map(d => {
    const info = [d.breed, d.age ? `${d.age} old` : ''].filter(Boolean).join(' • ');
    return `<div style="margin-bottom:10px;">
      <div class="pet-name">${d.name || ''}</div>
      <div class="pet-info">${info || ''}</div>
    </div>`;
  }).join('');
}

function updatePageHeader() {
  const names = currentDogs.map(d => d.name).filter(Boolean);
  document.getElementById('pageTitle').textContent = names.length
    ? `${names.join(' & ')}'s Profile`
    : 'Pet Profile';
  document.getElementById('pageSubtitle').textContent =
    `Update your dog${currentDogs.length > 1 ? 's\'' : '\'s'} information and care notes`;
}

function renderDogCards() {
  const container = document.getElementById('dogsContainer');
  container.innerHTML = '';
  currentDogs.forEach((dog, i) => {
    container.insertAdjacentHTML('beforeend', dogCardHTML(dog, i));
  });
  // Add dog button
  let addBtn = document.getElementById('addDogBtn');
  if (!addBtn) {
    addBtn = document.createElement('button');
    addBtn.id = 'addDogBtn';
    addBtn.type = 'button';
    addBtn.style.cssText = 'margin-top:12px;background:#8FA8A2;border:none;border-radius:6px;padding:14px 24px;font-size:14px;font-weight:500;color:white;cursor:pointer;font-family:inherit;width:100%;transition:background 0.2s;letter-spacing:0.02em;';
    addBtn.textContent = '+ Add a dog';
    addBtn.onmouseover = () => { addBtn.style.background = '#7a9690'; };
    addBtn.onmouseout  = () => { addBtn.style.background = '#8FA8A2'; };
    addBtn.onclick = addDog;
    container.after(addBtn);
    // Spacer between button and Home Access
    let spacer = document.getElementById('addDogSpacer');
    if (!spacer) {
      spacer = document.createElement('div');
      spacer.id = 'addDogSpacer';
      spacer.style.height = '24px';
      addBtn.after(spacer);
    }
  }
}

function dogCardHTML(dog, i) {
  const isOnly = currentDogs.length === 1;
  const label = isOnly ? 'Your Dog' : `Dog ${i + 1}${dog.name ? ` — ${dog.name}` : ''}`;
  return `
    <div class="section-card" id="dogCard${i}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 class="section-title" style="margin-bottom:0;">${label}</h2>
        ${!isOnly ? `<button type="button" onclick="removeDog(${i})" style="background:none;border:none;font-size:13px;color:#7A7A7A;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit;" onmouseover="this.style.color='#C17B6F'" onmouseout="this.style.color='#7A7A7A'">Remove</button>` : ''}
      </div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Name</label><div class="field-value"><input type="text" id="dog_name_${i}" value="${dog.name || ''}" placeholder="Dog's name"></div></div>
        <div class="field-group"><label class="field-label">Breed</label><div class="field-value"><input type="text" id="dog_breed_${i}" value="${dog.breed || ''}" placeholder="Breed"></div></div>
      </div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Age</label><div class="field-value"><input type="text" id="dog_age_${i}" value="${dog.age || ''}" placeholder="e.g. 4 years"></div></div>
        <div class="field-group"><label class="field-label">Weight</label><div class="field-value"><input type="text" id="dog_weight_${i}" value="${dog.weight || ''}" placeholder="e.g. 55 lbs"></div></div>
      </div>
      <div class="field-row full"><div class="field-group"><label class="field-label">Temperament</label><div class="field-value"><textarea id="dog_temperament_${i}" placeholder="Friendly, energetic, shy…">${dog.temperament || ''}</textarea></div></div></div>
      <div class="field-row full"><div class="field-group"><label class="field-label">Walking Preferences</label><div class="field-value"><textarea id="dog_walkingPrefs_${i}" placeholder="Pace, favourite routes, any habits…">${dog.walkingPrefs || ''}</textarea></div></div></div>
      <div class="field-row full"><div class="field-group"><label class="field-label">Known Triggers</label><div class="field-value"><textarea id="dog_triggers_${i}" placeholder="Other dogs, loud noises, bicycles…">${dog.triggers || ''}</textarea></div></div></div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Medications</label><div class="field-value"><input type="text" id="dog_medications_${i}" value="${dog.medications || ''}" placeholder="Any medications?"></div></div>
        <div class="field-group"><label class="field-label">Allergies</label><div class="field-value"><input type="text" id="dog_allergies_${i}" value="${dog.allergies || ''}" placeholder="Any known allergies?"></div></div>
      </div>
    </div>
  `;
}

function collectCurrentFormValues() {
  return currentDogs.map((_, i) => ({
    name:         document.getElementById(`dog_name_${i}`)?.value || '',
    breed:        document.getElementById(`dog_breed_${i}`)?.value || '',
    age:          document.getElementById(`dog_age_${i}`)?.value || '',
    weight:       document.getElementById(`dog_weight_${i}`)?.value || '',
    temperament:  document.getElementById(`dog_temperament_${i}`)?.value || '',
    walkingPrefs: document.getElementById(`dog_walkingPrefs_${i}`)?.value || '',
    triggers:     document.getElementById(`dog_triggers_${i}`)?.value || '',
    medications:  document.getElementById(`dog_medications_${i}`)?.value || '',
    allergies:    document.getElementById(`dog_allergies_${i}`)?.value || '',
  }));
}

window.addDog = () => {
  // Snapshot current form values before re-render so nothing is lost
  currentDogs = collectCurrentFormValues();
  currentDogs.push({ name: '', breed: '', age: '', weight: '', temperament: '', walkingPrefs: '', triggers: '', medications: '', allergies: '' });
  renderDogCards();
  updateSidebar();
  updatePageHeader();
  // Scroll new card into view
  const newCard = document.getElementById(`dogCard${currentDogs.length - 1}`);
  newCard?.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

window.removeDog = (i) => {
  const dogName = document.getElementById(`dog_name_${i}`)?.value || `Dog ${i + 1}`;
  if (!confirm(`Remove ${dogName} from your profile?`)) return;
  currentDogs = collectCurrentFormValues();
  currentDogs.splice(i, 1);
  renderDogCards();
  updateSidebar();
  updatePageHeader();
};

window.saveProfile = async () => {
  if (!userId || !memberData) return;
  const updatedDogs = collectCurrentFormValues();
  const previousDogNames = (memberData.dogs || [{ name: memberData.dogName }]).map(d => d.name).filter(Boolean).sort().join(', ');
  const newDogNames = updatedDogs.map(d => d.name).filter(Boolean).sort().join(', ');
  const dogsChanged = previousDogNames !== newDogNames;

  try {
    await updateDoc(doc(db, 'members', userId), {
      dogs: updatedDogs,
      dogName:  updatedDogs[0].name,
      petBreed: updatedDogs[0].breed,
      address:      document.getElementById('homeAddress').value,
      parkingNotes: document.getElementById('parkingNotes').value,
      entryCode:    document.getElementById('entryCode').value,
      accessNotes:  document.getElementById('accessNotes').value,
    });

    // Notify admin if dog roster changed
    if (dogsChanged) {
      await addDoc(collection(db, 'submissions'), {
        type: 'dog_update',
        memberId: userId,
        memberName: memberData.name || '',
        previousDogs: previousDogNames,
        newDogs: newDogNames,
        message: `${memberData.name || 'A member'} updated their dog roster. Was: ${previousDogNames || 'none'}. Now: ${newDogNames || 'none'}.`,
        read: false,
        createdAt: serverTimestamp(),
      });
    }

    // Update local state
    memberData.dogs = updatedDogs;
    memberData.dogName = updatedDogs[0].name;
    currentDogs = updatedDogs.map(d => ({ ...d }));
    updateSidebar();
    updatePageHeader();
    showNotification('Profile saved!');
  } catch(e) {
    showNotification('Error saving: ' + e.message, 'error');
  }
};

window.signOutMember = () => signOut(auth).then(() => window.location.href = 'portal-login.html');

function showNotification(message, type = 'success') {
  const n = document.createElement('div');
  n.className = `notification ${type}`;
  n.textContent = message;
  document.body.appendChild(n);
  setTimeout(() => { n.classList.add('dismiss'); setTimeout(() => n.remove(), 300); }, 3000);
}
  </script>
