<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Profile - Port City Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f3ed;
      color: #0D1B2A;
    }

    .portal-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #0D1B2A;
      color: white;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .sidebar-logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: #8FA8A2;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-item.active {
      background: #C17B6F;
      color: white;
    }

    .sidebar-pet {
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
      padding-top: 16px;
      color: #8FA8A2;
      font-size: 13px;
    }

    .pet-name {
      margin-bottom: 8px;
    }

    .pet-info {
      font-size: 12px;
      opacity: 0.8;
    }

    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      max-width: 900px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 14px;
      color: #888;
    }

    /* Section Card */
    .section-card {
      background: #FAF8F4;
      border: 1px solid #E5E0D8;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.04);
    }

    .section-title {
      font-size: 18px;
      font-weight: 500;
      color: #0D1B2A;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 20px;
    }

    .field-row.full {
      grid-template-columns: 1fr;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: #7A7A7A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-value {
      font-size: 14px;
      color: #0D1B2A;
    }

    .field-value input,
    .field-value select,
    .field-value textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E5E0D8;
      background: white;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      color: #0D1B2A;
    }

    .field-value textarea {
      resize: vertical;
      min-height: 80px;
    }

    .field-value input:focus,
    .field-value select:focus,
    .field-value textarea:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    /* Photo Section */
    .photo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .photo-upload {
      width: 140px;
      height: 140px;
      background: rgba(193, 123, 111, 0.1);
      border: 2px dashed #C17B6F;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 48px;
      transition: all 0.2s;
    }

    .photo-upload:hover {
      background: rgba(193, 123, 111, 0.15);
    }

    /* Tag List */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      background: white;
      border: 1px solid #E5E0D8;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tag.selected {
      background: #C17B6F;
      color: white;
      border-color: #C17B6F;
    }

    /* Form Actions */
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #C17B6F;
      color: white;
    }

    .btn-primary:hover {
      background: #A36358;
    }

    .btn-secondary {
      background: white;
      color: #0D1B2A;
      border: 1px solid #E5E0D8;
    }

    .btn-secondary:hover {
      background: #FAF8F4;
    }

    @media (max-width: 768px) {
      .field-row {
        grid-template-columns: 1fr;
      }

      .section-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="portal-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">Port City Leash Club</div>
      <nav class="sidebar-nav">
        <a href="portal-dashboard.html" class="nav-item">Dashboard</a>
        <a href="portal-pet-profile.html" class="nav-item active">Pet Profile</a>
        <a href="portal-walk-history.html" class="nav-item">Walk History</a>
        <a href="portal-extras.html" class="nav-item">Additional Care</a>
        <a href="portal-messages.html" class="nav-item">Messages</a>
        <a href="portal-account.html" class="nav-item">Account</a>
      </nav>
      <div class="sidebar-pet">
        <div class="pet-name">Scout</div>
        <div class="pet-info">Golden Retriever • 5 years old</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="page-header">
        <h1>Scout's Profile</h1>
        <p>Update Scout's information and preferences</p>
      </div>

      <form onsubmit="handleSaveProfile(event)">
        <!-- Section 1: Basic Information -->
        <div class="section-card">
          <h2 class="section-title">Basic Information</h2>

          <div class="photo-section">
            <label for="photo" class="photo-upload">📷</label>
            <input type="file" id="photo" style="display: none;">
            <div style="font-size: 12px; color: #7A7A7A;">Click to upload photo</div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Name</label>
              <div class="field-value"><input type="text" value="Scout" placeholder="Dog's name"></div>
            </div>
            <div class="field-group">
              <label class="field-label">Breed</label>
              <div class="field-value"><input type="text" value="Golden Retriever" placeholder="Breed"></div>
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Age</label>
              <div class="field-value"><input type="number" value="5" placeholder="Age"></div>
            </div>
            <div class="field-group">
              <label class="field-label">Weight</label>
              <div class="field-value"><input type="text" value="65 lbs" placeholder="Weight"></div>
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Gender</label>
              <div class="field-value">
                <select>
                  <option selected>Male</option>
                  <option>Female</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: Care Notes -->
        <div class="section-card">
          <h2 class="section-title">Care Notes</h2>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Temperament</label>
              <div class="field-value">
                <textarea placeholder="Describe Scout's temperament (e.g., friendly, energetic, shy)">Scout is friendly, energetic, and loves other dogs. He's food motivated and responds well to treats.</textarea>
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Walking Preferences</label>
              <div class="field-value">
                <textarea placeholder="How does Scout like to walk?">Scout prefers moderate to fast pace. He loves exploring new areas and doesn't mind longer walks.</textarea>
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Known Triggers</label>
              <div class="field-value">
                <textarea placeholder="Any triggers or things to avoid?">Scout gets excited around other dogs but is friendly. He's nervous around loud noises.</textarea>
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Medications</label>
              <div class="field-value">
                <input type="text" placeholder="Any medications? (e.g., Amoxicillin 250mg, twice daily)">
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Allergies</label>
              <div class="field-value">
                <input type="text" placeholder="Any known allergies? (foods, treats, environmental)">
              </div>
            </div>
          </div>
        </div>

        <!-- Section 3: Home Access -->
        <div class="section-card">
          <h2 class="section-title">Home Access</h2>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Home Address</label>
              <div class="field-value">
                <input type="text" value="124 Oak Street, Apt 302, Wilmington, NC 28403" placeholder="Full address">
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Parking Notes</label>
              <div class="field-value">
                <textarea placeholder="Where should walkers park? Any specific instructions?">Parking lot on side of building. Preferred spots are near the main entrance. Building entrance is on north side.</textarea>
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Gate Code / Entry Instructions</label>
              <div class="field-value">
                <input type="text" placeholder="Building code, alarm code, or entry instructions">
              </div>
            </div>
          </div>

          <div class="field-row full">
            <div class="field-group">
              <label class="field-label">Additional Notes</label>
              <div class="field-value">
                <textarea placeholder="Any other access information?">Key is in the mailbox. Alarm code is 1234. Gate buzzer is on the intercom by the front door.</textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function handleSaveProfile(e) {
      e.preventDefault();
      alert('Scout\'s profile has been updated!');
    }
  </script>
</body>
</html>
