<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" href="../images/favicon.png">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" href="../images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Admin | Port City Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .reset-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .reset-header h1 {
      font-size: 24px;
      font-weight: 500;
      color: #0D1B2A;
      margin-bottom: 8px;
    }

    .reset-header p {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    .reset-btn {
      width: 100%;
      background: #C17B6F;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .reset-btn:hover {
      background: #b06a60;
    }

    .reset-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      font-size: 13px;
    }

    .back-link a {
      color: #C17B6F;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .success-message,
    .error-message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      border: 0.5px solid #4caf50;
    }

    .error-message {
      background: #fcebeb;
      color: #a32d2d;
      border: 0.5px solid #f09595;
    }

    .success-message.show,
    .error-message.show {
      display: block;
    }

    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 12px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ddd;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .step.active .step-number {
      background: #C17B6F;
      color: white;
    }

    .step-label {
      color: #888;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-header">
      <div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; color: #8FA8A2;">Port City Leash Club · Admin</div>
      <h1>Reset Password</h1>
      <p id="headerSubtext">We'll help you get back into your account</p>
    </div>

    <div class="step-indicator">
      <div class="step active" id="step1Indicator">
        <div class="step-number">1</div>
        <div class="step-label">Email</div>
      </div>
      <div class="step" id="step2Indicator">
        <div class="step-number">2</div>
        <div class="step-label">Check inbox</div>
      </div>
      <div class="step" id="step3Indicator">
        <div class="step-number">3</div>
        <div class="step-label">New Password</div>
      </div>
    </div>

    <div class="success-message" id="successMessage"></div>
    <div class="error-message" id="errorMessage"></div>

    <!-- Step 1: Email -->
    <form id="emailForm" class="form-section active">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="reset-btn" id="sendBtn">Send Reset Link</button>
    </form>

    <!-- Step 2: Waiting on email link (shown after send) -->
    <div id="waitingSection" class="form-section">
      <p style="font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 16px;">
        Click the link in that email to come back here and set a new password. Didn't get it?
        Check spam, or go back and try again.
      </p>
      <button type="button" class="reset-btn" style="background: #ddd; color: #888;" onclick="goBackToEmail()">Back</button>
    </div>

    <!-- Step 3: New Password (shown when arriving via emailed reset link) -->
    <form id="passwordForm" class="form-section">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required minlength="6">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="reset-btn" id="confirmBtn">Reset Password</button>
    </form>

    <div class="back-link">
      <a href="/admin">Back to login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      getAuth,
      sendPasswordResetEmail,
      verifyPasswordResetCode,
      confirmPasswordReset
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
      authDomain: "port-city-leash-club-827ab.firebaseapp.com",
      projectId: "port-city-leash-club-827ab",
      storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
      messagingSenderId: "649385306352",
      appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"
    };

    // Matches admin/index.html and admin/dashboard.html, which both use the default app
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailForm = document.getElementById('emailForm');
    const waitingSection = document.getElementById('waitingSection');
    const passwordForm = document.getElementById('passwordForm');
    const successEl = document.getElementById('successMessage');
    const errorEl = document.getElementById('errorMessage');
    const headerSubtext = document.getElementById('headerSubtext');
    const sendBtn = document.getElementById('sendBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    function showStep(step) {
      document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));

      if (step === 1) emailForm.classList.add('active');
      if (step === 2) waitingSection.classList.add('active');
      if (step === 3) passwordForm.classList.add('active');

      for (let i = 1; i <= step; i++) {
        document.getElementById(`step${i}Indicator`).classList.add('active');
      }
    }

    function clearMessages() {
      successEl.classList.remove('show');
      errorEl.classList.remove('show');
    }

    window.goBackToEmail = function () {
      clearMessages();
      showStep(1);
    };

    // ── Check whether we arrived here via the emailed reset link ──
    // Firebase reset links look like: ...?mode=resetPassword&oobCode=XXXX&apiKey=...
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');

    if (mode === 'resetPassword' && oobCode) {
      // Arrived from the email link — verify the code, then let them set a new password
      headerSubtext.textContent = 'Choose a new password below';
      verifyPasswordResetCode(auth, oobCode)
        .then((email) => {
          showStep(3);
          passwordForm.dataset.email = email;
        })
        .catch((err) => {
          errorEl.textContent = 'This reset link is invalid or has expired. Please request a new one below.';
          errorEl.classList.add('show');
          showStep(1);
        });
    } else {
      showStep(1);
    }

    // ── Step 1: send the reset email ──
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const email = document.getElementById('email').value.trim();

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';

      try {
        await sendPasswordResetEmail(auth, email, {
          url: window.location.origin + '/admin/reset-password'
        });
        successEl.textContent = "Check your email. We've sent a reset link to " + email + ".";
        successEl.classList.add('show');
        showStep(2);
      } catch (err) {
        let msg = 'Something went wrong. Please try again.';
        if (err.code === 'auth/user-not-found') {
          // Don't reveal whether the email exists — show the same success state
          successEl.textContent = "If an account exists for " + email + ", a reset link is on its way.";
          successEl.classList.add('show');
          showStep(2);
        } else if (err.code === 'auth/invalid-email') {
          msg = 'Please enter a valid email address.';
          errorEl.textContent = msg;
          errorEl.classList.add('show');
        } else if (err.code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Please wait a moment and try again.';
          errorEl.textContent = msg;
          errorEl.classList.add('show');
        } else {
          errorEl.textContent = msg;
          errorEl.classList.add('show');
        }
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Reset Link';
      }
    });

    // ── Step 3: confirm the new password ──
    passwordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('show');
        return;
      }
      if (newPassword.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('show');
        return;
      }

      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Resetting…';

      try {
        await confirmPasswordReset(auth, oobCode, newPassword);
        successEl.textContent = 'Password reset! Redirecting to login…';
        successEl.classList.add('show');
        setTimeout(() => {
          window.location.href = '/admin';
        }, 1500);
      } catch (err) {
        errorEl.textContent = 'This reset link is invalid or has expired. Please request a new one.';
        errorEl.classList.add('show');
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
