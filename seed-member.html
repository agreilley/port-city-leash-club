<!DOCTYPE html>
<html>
<head><title>Seed Demo Member</title></head>
<body style="font-family:monospace;background:#0D1B2A;color:#8FA8A2;padding:32px;">
<h2 style="color:white;">Creating demo member account + seeding walks…</h2>
<div id="log"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, setDoc, doc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = {
  apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
  authDomain: "port-city-leash-club-827ab.firebaseapp.com",
  projectId: "port-city-leash-club-827ab",
  storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
  messagingSenderId: "649385306352",
  appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"
};

// Two app instances so admin sign-in doesn't collide
const adminApp = initializeApp(cfg, 'seed-admin');
const memberApp = initializeApp(cfg, 'seed-member');
const adminAuth = getAuth(adminApp);
const memberAuth = getAuth(memberApp);
const db = getFirestore(adminApp);

function log(msg, ok=true) {
  const d = document.createElement('div');
  d.style.marginBottom = '4px';
  d.style.color = ok ? '#2D9E5E' : '#C17B6F';
  d.textContent = (ok ? '✓ ' : '✗ ') + msg;
  document.getElementById('log').appendChild(d);
}

function daysFromNow(n, h=9) {
  const d = new Date(); d.setDate(d.getDate()+n); d.setHours(h,0,0,0);
  return Timestamp.fromDate(d);
}

const adminEmail = prompt('Your admin email (alison.reilley@gmail.com):');
const adminPass  = prompt('Your admin password:');

// Sign in admin first so we can write to Firestore
await signInWithEmailAndPassword(adminAuth, adminEmail, adminPass);
log('Admin signed in');

// Create the demo member Firebase Auth account
const DEMO_EMAIL    = 'demo@portcityleashclub.com';
const DEMO_PASSWORD = 'LeashClub2026!';

let memberUid;
try {
  const cred = await createUserWithEmailAndPassword(memberAuth, DEMO_EMAIL, DEMO_PASSWORD);
  memberUid = cred.user.uid;
  log(`Created member Auth account (${DEMO_EMAIL})`);
} catch(e) {
  if (e.code === 'auth/email-already-in-use') {
    // Already exists — sign in to get the UID
    const cred = await signInWithEmailAndPassword(memberAuth, DEMO_EMAIL, DEMO_PASSWORD);
    memberUid = cred.user.uid;
    log(`Member account already exists, got UID`);
  } else {
    log('Auth create failed: ' + e.message, false);
    throw e;
  }
}

// Write member Firestore doc at their UID
await setDoc(doc(db, 'members', memberUid), {
  name: 'Sarah Johnson',
  email: DEMO_EMAIL,
  phone: '(910) 555-0142',
  tier: 'Standard',
  status: 'active',
  billingDate: 3,
  // Legacy single-dog fields (kept for backwards compat)
  dogName: 'Scout',
  petBreed: 'Golden Retriever',
  petAge: 5,
  // New dogs array
  dogs: [
    { name: 'Scout', breed: 'Golden Retriever', age: '5 years', weight: '65 lbs', temperament: 'Friendly, energetic, loves other dogs. Food motivated and responds well to treats.', walkingPrefs: 'Moderate to fast pace. Loves exploring new areas.', triggers: 'Gets excited around other dogs but is friendly. Nervous around loud noises.', medications: '', allergies: '' },
    { name: 'Rosie', breed: 'Beagle', age: '3 years', weight: '25 lbs', temperament: 'Curious and gentle. Loves sniffing everything on walks.', walkingPrefs: 'Slower pace, lots of sniff breaks.', triggers: 'Can get distracted by scents — keep a close eye near traffic.', medications: '', allergies: '' }
  ],
  defaultWalkDays: ['Monday', 'Wednesday'],
  defaultTimeSlot: 'Early Morning',
  address: '412 Forest Hills Dr, Wilmington NC 28403',
  entryMethod: 'key',
  emergencyContact: 'Mike Johnson',
  emergencyPhone: '(910) 555-0199',
  veterinarian: 'Wilmington Animal Hospital',
  veterinarianPhone: '(910) 555-0300',
  createdAt: Timestamp.now(),
});
log(`Member doc written at members/${memberUid}`);

// Seed walks for this member, using their real UID as memberId
const walks = [
  // Past / completed
  { id: `walk_demo_001`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(-14, 8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Scout had a great walk today! She was very energetic and loved sniffing around the park.' }},
  { id: `walk_demo_002`, data: { memberId: memberUid, walkerId: 'walker_marcus',     walkerName: 'Marcus',   dogName: 'Scout', date: daysFromNow(-12, 8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Good walk. Scout found a stick and carried it the whole way.' }},
  { id: `walk_demo_003`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(-7,  8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Scout was in a playful mood. Stopped to say hi to a few neighbors.' }},
  { id: `walk_demo_004`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(-5,  8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Rainy walk but Scout didn\'t mind at all. Came home muddy and happy!' }},
  { id: `walk_demo_005`, data: { memberId: memberUid, walkerId: 'walker_marcus',     walkerName: 'Marcus',   dogName: 'Scout', date: daysFromNow(-3,  8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Great energy today. Scout made a new dog friend on the trail.' }},
  { id: `walk_demo_006`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(-1,  8), timeSlot: 'morning', status: 'completed', duration: '30-minute walk', notes: 'Calm walk today. Scout was happy to trot along at a steady pace.' }},
  // Upcoming / scheduled
  { id: `walk_demo_007`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(2,  8), timeSlot: 'morning', status: 'scheduled', duration: '30-minute walk', notes: '' }},
  { id: `walk_demo_008`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(5,  8), timeSlot: 'morning', status: 'scheduled', duration: '30-minute walk', notes: '' }},
  { id: `walk_demo_009`, data: { memberId: memberUid, walkerId: 'walker_marcus',     walkerName: 'Marcus',   dogName: 'Scout', date: daysFromNow(7,  8), timeSlot: 'morning', status: 'scheduled', duration: '30-minute walk', notes: '' }},
  { id: `walk_demo_010`, data: { memberId: memberUid, walkerId: 'walker_sarah_test', walkerName: 'Sarah T.', dogName: 'Scout', date: daysFromNow(9,  8), timeSlot: 'morning', status: 'scheduled', duration: '30-minute walk', notes: '' }},
];

for (const { id, data } of walks) {
  try {
    await setDoc(doc(db, 'walks', id), data);
    log(id);
  } catch(e) { log(`${id}: ${e.message}`, false); }
}

document.querySelector('h2').textContent = '✓ All done!';
document.querySelector('h2').style.color = '#2D9E5E';

const summary = document.createElement('div');
summary.style.cssText = 'margin-top:24px;background:#1a2a3a;padding:20px;border-radius:8px;line-height:1.8;';
summary.innerHTML = `
  <div style="color:white;font-size:14px;margin-bottom:12px;">Demo member portal login:</div>
  <div>Email: <span style="color:white;">${DEMO_EMAIL}</span></div>
  <div>Password: <span style="color:white;">${DEMO_PASSWORD}</span></div>
  <div style="margin-top:12px;"><a href="portal-login.html" style="color:#C17B6F;">→ Go to member portal login</a></div>
`;
document.getElementById('log').appendChild(summary);
</script>
</body>
</html>
