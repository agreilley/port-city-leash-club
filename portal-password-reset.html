<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - The Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .reset-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .reset-header h1 {
      font-size: 24px;
      font-weight: 500;
      color: #0D1B2A;
      margin-bottom: 8px;
    }

    .reset-header p {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    .reset-btn {
      width: 100%;
      background: #C17B6F;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .reset-btn:hover {
      background: #b06a60;
    }

    .back-link {
      text-align: center;
      font-size: 13px;
    }

    .back-link a {
      color: #C17B6F;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      border: 0.5px solid #4caf50;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 12px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ddd;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .step.active .step-number {
      background: #C17B6F;
      color: white;
    }

    .step-label {
      color: #888;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-header">
      <div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; color: #8FA8A2;">The Leash Club</div>
      <h1>Reset Password</h1>
      <p>We'll help you get back into your account</p>
    </div>

    <div class="step-indicator">
      <div class="step active" id="step1Indicator">
        <div class="step-number">1</div>
        <div class="step-label">Email</div>
      </div>
      <div class="step" id="step2Indicator">
        <div class="step-number">2</div>
        <div class="step-label">Verify</div>
      </div>
      <div class="step" id="step3Indicator">
        <div class="step-number">3</div>
        <div class="step-label">New Password</div>
      </div>
    </div>

    <div class="success-message" id="successMessage">
      Check your email for a reset code. We've sent it to you.
    </div>

    <!-- Step 1: Email -->
    <form id="emailForm" class="form-section active">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="sarah@email.com" required>
      </div>
      <button type="submit" class="reset-btn">Send Reset Code</button>
    </form>

    <!-- Step 2: Verify Code -->
    <form id="codeForm" class="form-section">
      <div class="form-group">
        <label for="code">Enter the code from your email</label>
        <input type="text" id="code" name="code" placeholder="000000" maxlength="6" required>
      </div>
      <button type="submit" class="reset-btn">Verify Code</button>
      <button type="button" class="reset-btn" style="background: #ddd; color: #888;" onclick="goBackToEmail()">Back</button>
    </form>

    <!-- Step 3: New Password -->
    <form id="passwordForm" class="form-section">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="reset-btn">Reset Password</button>
      <button type="button" class="reset-btn" style="background: #ddd; color: #888;" onclick="goBackToCode()">Back</button>
    </form>

    <div class="back-link">
      <a href="portal-login.html">Back to login</a>
    </div>
  </div>

  <script>
    document.getElementById('emailForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      
      // Show success message
      document.getElementById('successMessage').classList.add('show');
      
      // Move to step 2
      setTimeout(() => {
        showStep(2);
      }, 1500);
    });

    document.getElementById('codeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const code = document.getElementById('code').value;
      
      if (code.length === 6) {
        showStep(3);
      }
    });

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword === confirmPassword && newPassword.length >= 6) {
        alert('Password reset successfully! Redirecting to login...');
        window.location.href = 'portal-login.html';
      } else {
        alert('Passwords do not match or are too short');
      }
    });

    function showStep(step) {
      // Hide all forms
      document.querySelectorAll('.form-section').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelectorAll('.step').forEach(el => {
        el.classList.remove('active');
      });

      // Show current step
      if (step === 1) document.getElementById('emailForm').classList.add('active');
      if (step === 2) document.getElementById('codeForm').classList.add('active');
      if (step === 3) document.getElementById('passwordForm').classList.add('active');

      // Update step indicators
      for (let i = 1; i <= 3; i++) {
        if (i <= step) {
          document.getElementById(`step${i}Indicator`).classList.add('active');
        }
      }
    }

    function goBackToEmail() {
      showStep(1);
      document.getElementById('successMessage').classList.remove('show');
    }

    function goBackToCode() {
      showStep(2);
    }
  </script>
</body>
</html>
