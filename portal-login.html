<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Leash Club</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 24px; font-weight: 500; color: #0D1B2A; margin-bottom: 8px; }
    .login-header p { font-size: 13px; color: #888; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 12px; border: 0.5px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit; transition: border-color 0.2s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      outline: none; border-color: #8FA8A2; box-shadow: 0 0 0 3px rgba(143,168,162,0.1);
    }
    .remember-forgot {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; font-size: 13px;
    }
    .remember-forgot a { color: #C17B6F; text-decoration: none; }
    .remember-forgot a:hover { text-decoration: underline; }
    .login-btn {
      width: 100%; background: #C17B6F; color: white; border: none;
      padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500;
       transition: background 0.2s; font-family: inherit;
    }
    .login-btn:hover { background: #b06a60; }
    .login-btn:disabled { background: #ccc; cursor: not-allowed; }
    .divider {
      display: flex; align-items: center; margin: 24px 0; font-size: 12px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
    .divider span { padding: 0 8px; color: #888; }
    .signup-link { text-align: center; font-size: 13px; color: #888; }
    .signup-link a { color: #C17B6F; text-decoration: none; font-weight: 500; }
    .signup-link a:hover { text-decoration: underline; }
    .error-message {
      background: #fcebeb; color: #a32d2d; padding: 12px; border-radius: 8px;
      font-size: 13px; margin-bottom: 20px; border: 0.5px solid #f09595; display: none;
    }
    .error-message.show { display: block; }
    @media (max-width: 768px) {
      html, body { overflow-x: hidden; }
      .login-container { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; color: #8FA8A2;">Port City Leash Club</div>
      <h1>The Leash Club</h1>
      <p>Member Portal</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="remember-forgot">
        <label style="margin:0; font-weight:400;">
          <input type="checkbox" style="margin-right:6px;"> Remember me
        </label>
        <a href="portal-password-reset">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

    <div class="divider"><span>New member?</span></div>
    <div class="signup-link">
      Sign up on the main website to get started with <a href="membership-request.html">The Leash Club</a>
    </div>
  </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
  authDomain: "port-city-leash-club-827ab.firebaseapp.com",
  projectId: "port-city-leash-club-827ab",
  storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
  messagingSenderId: "649385306352",
  appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"
};

const app = initializeApp(firebaseConfig, 'member-app');
const auth = getAuth(app);

// If already logged in, go straight to dashboard
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'portal-dashboard.html';
});

const form = document.getElementById('loginForm');
const errorEl = document.getElementById('errorMessage');
const loginBtn = document.getElementById('loginBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  errorEl.textContent = '';
  errorEl.classList.remove('show');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in…';

  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged will fire and redirect
  } catch (err) {
    let msg = 'Login failed. Please try again.';
    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
      msg = 'Incorrect email or password.';
    } else if (err.code === 'auth/invalid-email') {
      msg = 'Please enter a valid email address.';
    } else if (err.code === 'auth/too-many-requests') {
      msg = 'Too many attempts. Please wait a moment and try again.';
    }
    errorEl.textContent = msg;
    errorEl.classList.add('show');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
