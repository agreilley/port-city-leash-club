<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Leash Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 500;
      color: #0D1B2A;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 13px;
      color: #888;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #8FA8A2;
      box-shadow: 0 0 0 3px rgba(143, 168, 162, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-forgot a {
      color: #C17B6F;
      text-decoration: none;
    }

    .remember-forgot a:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      background: #C17B6F;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: #b06a60;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #ddd;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 8px;
      color: #888;
    }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    .signup-link a {
      color: #C17B6F;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fcebeb;
      color: #a32d2d;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      border: 0.5px solid #f09595;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; }
    .login-card { margin: 20px; padding: 32px 24px; }
  }
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; color: #8FA8A2;">The Leash Club</div>
      <h1>The Leash Club</h1>
      <p>Member Portal</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="sarah@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <div class="remember-forgot">
        <label style="margin: 0; font-weight: 400;">
          <input type="checkbox" style="margin-right: 6px;">
          Remember me
        </label>
        <a href="portal-password-reset.html">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>New member?</span>
    </div>

    <div class="signup-link">
      Sign up on the main website to get started with <a href="membership-request.html">The Leash Club</a>
    </div>
  </div>

  <script>
    // Demo login - in production this would call backend API
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');

      // Simple validation
      if (!email || !password) {
        errorMessage.textContent = 'Please fill in all fields';
        errorMessage.classList.add('show');
        return;
      }

      if (email === 'sarah@email.com' && password === 'demo') {
        // Redirect to dashboard
        window.location.href = 'portal-dashboard.html';
      } else {
        errorMessage.textContent = 'Invalid email or password. (Try: sarah@email.com / demo)';
        errorMessage.classList.add('show');
      }
    });
  </script>
</body>
</html>
