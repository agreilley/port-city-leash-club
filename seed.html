<!DOCTYPE html>
<html lang="en">
<head>

<title>Seed Demo Data | PCLC Admin</title>
<style>
  body { font-family: monospace; background: #0D1B2A; color: #8FA8A2; padding: 32px; line-height: 1.8; }
  h1 { color: white; font-size: 18px; margin-bottom: 8px; }
  .sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 24px; }

<body>
<h1>Port City Leash Club — Demo Data Seeder</h1>
<div class="sub">Run this once to populate Firestore with demo walkers, members, walks, and inbox submissions.</div>
<button id="seedBtn" onclick="runSeed()">Seed Demo Data</button>
<div id="logs"></div>
<div id="done">✓ Done! All demo data seeded. You can now <a href="/admin/dashboard.html" style="color:#2D9E5E;">open the admin dashboard</a>.</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, setDoc, doc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCMP5mj12VkvaOeJ6CXFujycPjwFrD85RM",
  authDomain: "port-city-leash-club-827ab.firebaseapp.com",
  projectId: "port-city-leash-club-827ab",
  storageBucket: "port-city-leash-club-827ab.firebasestorage.app",
  messagingSenderId: "649385306352",
  appId: "1:649385306352:web:8e8a6fcbe8a7eff29dfa35"

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, ok = true) {
  const div = document.createElement('div');
  div.className = `log ${ok ? 'ok' : 'err'}`;
  div.textContent = (ok ? '✓ ' : '✗ ') + msg;
  document.getElementById('logs').appendChild(div);
}

function daysFromNow(n, h = 9) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  d.setHours(h, 0, 0, 0);
  return Timestamp.fromDate(d);
}

  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  btn.textContent = 'Seeding...';

  // Sign in as admin first (needed to write to Firestore)
  const email = prompt('Enter your admin email:');
  const password = prompt('Enter your admin password:');
  try {
    await signInWithEmailAndPassword(auth, email, password);
    log('Signed in as admin');
  } catch(e) {
    log('Sign in failed: ' + e.message, false);
    btn.disabled = false; return;
  }

  const writes = [
    // ── WALKERS ──────────────────────────────────────────────────────────
    ['walkers/walker_marcus', {
      name: 'Marcus Johnson', email: 'marcus@example.com', phone: '(910) 555-0101',

      topic: 'Membership question',
      message: 'Hi, I live in the Landfall area. Do you service that neighborhood? I have a 4-year-old lab and am interested in the Daily tier.',
      read: true
    }],
  ];

  let ok = 0, fail = 0;
  for (const [path, data] of writes) {
    const [col, id] = path.split('/');
    try {
      await setDoc(doc(db, col, id), data);
      log(path); ok++;
    } catch(e) {
      log(`${path}: ${e.message}`, false); fail++;
    }
  }

  log(`\nComplete: ${ok} written, ${fail} failed`, ok > 0);
  document.getElementById('done').style.display = 'block';
  btn.textContent = 'Done!';
};
</script>
